services:
  web:
    build: .
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erpleon -d erpleon_local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
